<!DOCTYPE html>
<html>
<head>

    <title>Login - MRI CRM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            height: 100vh;
            background: #007bff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Segoe UI;
        }

        .box {
            width: 400px;
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div class="box">

        <h3 class="text-center mb-4">MRI CRM Login</h3>

        <form id="loginForm">

            <div class="mb-3">

                <label>Email</label>

                <input id="email" class="form-control">

            </div>

            <div class="mb-3">

                <label>Password</label>

                <div class="input-group">

                    <input id="password" type="password" class="form-control">

                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>

                </div>

            </div>

            <div id="loginError" class="error mb-2"></div>

            <button class="btn btn-primary w-100">Login</button>

        </form>

        <div class="text-center mt-3">

            <a href="forgot.html">Forgot Password?</a>

            <br>

            <a href="register.html">Create Account</a>

        </div>
        <hr>

        <button onclick="googleLogin()" class="btn btn-danger w-100">
            Login with Google
        </button>


        <button onclick="linkedinLogin()" class="btn btn-primary w-100 mt-2">
            Login with LinkedIn
        </button>

    </div>
   

    <script src="js/auth.js"></script>

</body>
</html>
