<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI CRM Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI',sans-serif;
        }

        body {
            height: 100vh;
            background: #007bff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .circle1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
        }

        .circle2 {
            width: 250px;
            height: 250px;
            bottom: 10%;
            right: 15%;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 900px;
            height: 520px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .brand-panel {
            flex: 1;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .login-panel {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-box {
            width: 100%;
            max-width: 320px;
        }

        .error-msg {
            font-size: 13px;
            color: red;
            margin-top: 3px;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
        }

        .btn-login {
            height: 48px;
            border-radius: 8px;
            background: #2c5364;
            border: none;
            color: white;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <div class="background-shapes">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
    </div>

    <div class="login-container">

        <div class="brand-panel">

            <h1>MRI</h1>
            <h5>Customer Relationship Management</h5>
            <p>Secure CRM platform for modern businesses</p>

        </div>

        <div class="login-panel">

            <div class="login-box">

                <h4 class="text-center mb-3">Sign In</h4>

                <div id="successBox" class="success-msg"></div>

                <form id="loginForm">

                    <div class="form-floating">
                        <input id="email" type="email" class="form-control" placeholder="Email">
                        <label>Email</label>
                        <div id="emailError" class="error-msg"></div>
                    </div>

                    <div class="form-floating">
                        <input id="password" type="password" class="form-control" placeholder="Password">
                        <label>Password</label>
                        <div id="passwordError" class="error-msg"></div>
                    </div>

                    <div id="formError" class="error-msg text-center"></div>

                    <button class="btn btn-login w-100 mt-3">
                        Login
                    </button>

                </form>

                <div class="text-center mt-3">
                    Don't have an account?
                    <a href="register.html">Create account</a>
                </div>

            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>

</body>
</html>
