<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI CRM Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI',sans-serif;
        }

        body {
            height: 100vh;
            background: #007bff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .circle1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
        }

        .circle2 {
            width: 250px;
            height: 250px;
            bottom: 10%;
            right: 15%;
        }

        .container-box {
            position: relative;
            z-index: 1;
            width: 900px;
            height: 520px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .brand-panel {
            flex: 1;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

            .brand-panel h1 {
                font-size: 48px;
                font-weight: 700;
                margin-bottom: 10px;
            }

        .register-panel {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .register-box {
            width: 100%;
            max-width: 320px;
        }

        .register-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-floating {
            margin-bottom: 12px;
        }

        .error-msg {
            font-size: 13px;
            color: red;
            margin-top: 3px;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
        }

        .btn-register {
            height: 48px;
            border-radius: 8px;
            background: #2c5364;
            border: none;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="background-shapes">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
    </div>

    <div class="container-box">

        <div class="brand-panel">
            <h1>MRI</h1>
            <h5>Customer Relationship Management</h5>
            <p>Create your account to manage customers and sales.</p>
        </div>

        <div class="register-panel">

            <div class="register-box">

                <h4 class="register-title">Create Account</h4>

                <div id="successBox" class="success-msg"></div>

                <form id="registerForm">

                    <div class="form-floating">
                        <input id="name" class="form-control" placeholder="Name">
                        <label>Name</label>
                        <div id="nameError" class="error-msg"></div>
                    </div>

                    <div class="form-floating">
                        <input id="email" class="form-control" placeholder="Email">
                        <label>Email</label>
                        <div id="emailError" class="error-msg"></div>
                    </div>

                    <div class="form-floating password-wrapper">
                        <input id="password" type="password" class="form-control" placeholder="Password">
                        <label>Password</label>
                        <span class="show-pass" onclick="togglePassword()">👁</span>
                        <div id="passwordError" class="error-msg"></div>
                    </div>

                    <div class="form-floating">
                        <select id="role" class="form-control">
                            <option value="SalesRep">SalesRep</option>
                            <option value="Admin">Admin</option>
                        </select>
                        <label>Select Role</label>
                    </div>

                    <div id="formError" class="error-msg text-center"></div>

                    <button class="btn btn-register w-100">Register</button>

                </form>

                <div class="text-center mt-3">
                    Already have an account?
                    <a href="/">Login</a>
                </div>

            </div>
        </div>
    </div>

    <script>

        function togglePassword() {
            let pass = document.getElementById("password");

            pass.type = pass.type === "password" ? "text" : "password";
        }

    </script>

    <script src="js/auth.js"></script>

</body>
</html>
