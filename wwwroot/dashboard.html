<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">CRM Dashboard</span>
            <button onclick="logout()" class="btn btn-outline-light">
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">

        <div class="row g-4">

            <!-- Customers Card -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Customers</h5>
                        <p class="card-text">Manage customer information.</p>
                        <a href="#" class="btn btn-primary">View Customers</a>
                    </div>
                </div>
            </div>

            <!-- Leads Card -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Leads</h5>
                        <p class="card-text">Track potential clients.</p>
                        <a href="#" class="btn btn-primary">View Leads</a>
                    </div>
                </div>
            </div>

            <!-- Reports Card -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Reports</h5>
                        <p class="card-text">Analyze CRM performance.</p>
                        <a href="#" class="btn btn-primary">View Reports</a>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="js/auth.js"></script>

</body>

</html>
